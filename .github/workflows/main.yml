name: Zeeshan-Ultimate-Radar-Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Complete Android Project
        run: |
          mkdir -p app/src/main/java/com/zeeshan/filesharing
          mkdir -p app/src/main/res/values

          echo "android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties

          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          include ':app'" > settings.gradle

          echo "plugins { id 'com.android.application' version '8.1.0' apply false }" > build.gradle

          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.filesharing'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.zeeshan.filesharing'
                  minSdk 24
                  targetSdk 34
                  versionCode 8
                  versionName '8.0-UltimateRadar'
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.gms:play-services-nearby:18.7.0'
          }" > app/build.gradle

          echo "<resources>
              <string name=\"app_name\">Zeeshan Share</string>
          </resources>" > app/src/main/res/values/strings.xml

          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">
              <uses-permission android:name=\"android.permission.BLUETOOTH\" />
              <uses-permission android:name=\"android.permission.BLUETOOTH_ADMIN\" />
              <uses-permission android:name=\"android.permission.ACCESS_WIFI_STATE\" />
              <uses-permission android:name=\"android.permission.CHANGE_WIFI_STATE\" />
              <uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />
              <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />
              <uses-permission android:name=\"android.permission.BLUETOOTH_ADVERTISE\" />
              <uses-permission android:name=\"android.permission.BLUETOOTH_CONNECT\" />
              <uses-permission android:name=\"android.permission.BLUETOOTH_SCAN\" />
              <uses-permission android:name=\"android.permission.NEARBY_WIFI_DEVICES\" />
              <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />
              <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" />
              <uses-permission android:name=\"android.permission.MANAGE_EXTERNAL_STORAGE\" />

              <application android:label=\"@string/app_name\" android:theme=\"@style/Theme.AppCompat.Light.NoActionBar\" android:requestLegacyExternalStorage=\"true\">
                  <activity android:name=\".MainActivity\" android:exported=\"true\">
                      <intent-filter>
                          <action android:name=\"android.intent.action.MAIN\" />
                          <category android:name=\"android.intent.category.LAUNCHER\" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>" > app/src/main/AndroidManifest.xml

          cat << 'EOF' > app/src/main/java/com/zeeshan/filesharing/MainActivity.java
          package com.zeeshan.filesharing;
          
          import androidx.appcompat.app.AppCompatActivity;
          import android.os.Bundle;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Button;
          import android.view.Gravity;
          import android.view.View;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import android.content.Intent;
          import android.Manifest;
          import android.os.Build;
          import android.net.Uri;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import android.os.Environment;
          
          import com.google.android.gms.nearby.Nearby;
          import com.google.android.gms.nearby.connection.*;

          public class MainActivity extends AppCompatActivity {
              
              // UI Panels
              private LinearLayout setupCardPanel;
              private LinearLayout radarPanel;
              private LinearLayout dashboardPanel;
              private LinearLayout monitorPanel;
              
              private TextView statusText;
              private TextView monitorSpeedText;
              private TextView monitorProgressText;
              private LinearLayout radarDeviceList;
              
              private ConnectionsClient connectionsClient;
              private static final String SERVICE_ID = "com.zeeshan.filesharing.ULTIMATE";
              private String connectedEndpointId = null;
              private static final int REQUEST_PICK_FILE = 2;
              
              private long transferStartTime = 0;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  connectionsClient = Nearby.getConnectionsClient(this);

                  LinearLayout rootLayout = new LinearLayout(this);
                  rootLayout.setOrientation(LinearLayout.VERTICAL);
                  rootLayout.setBackgroundColor(Color.parseColor("#121212"));
                  rootLayout.setPadding(30, 60, 30, 30);

                  TextView header = new TextView(this);
                  header.setText("ZEESHAN SHARE");
                  header.setTextColor(Color.WHITE);
                  header.setTextSize(32);
                  header.setGravity(Gravity.CENTER);
                  header.setTypeface(null, android.graphics.Typeface.BOLD);
                  rootLayout.addView(header);

                  statusText = new TextView(this);
                  statusText.setText("Complete Setup to Start");
                  statusText.setTextColor(Color.parseColor("#00E676"));
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setPadding(0, 20, 0, 40);
                  rootLayout.addView(statusText);

                  // 1. SETUP CARD (App Khulte Hi)
                  setupCardPanel = new LinearLayout(this);
                  setupCardPanel.setOrientation(LinearLayout.VERTICAL);
                  setupCardPanel.setBackgroundColor(Color.parseColor("#1E1E1E"));
                  setupCardPanel.setPadding(40, 40, 40, 40);
                  
                  TextView setupTitle = new TextView(this);
                  setupTitle.setText("ONE-TAP SETUP");
                  setupTitle.setTextColor(Color.WHITE);
                  setupTitle.setTextSize(20);
                  setupCardPanel.addView(setupTitle);
                  
                  Button grantPermBtn = new Button(this);
                  grantPermBtn.setText("Turn ON Bluetooth, Location & Storage");
                  grantPermBtn.setBackgroundColor(Color.parseColor("#D50000"));
                  grantPermBtn.setTextColor(Color.WHITE);
                  grantPermBtn.setOnClickListener(v -> requestPermissions());
                  setupCardPanel.addView(grantPermBtn);
                  
                  Button startRadarBtn = new Button(this);
                  startRadarBtn.setText("Launch Radar Mode");
                  startRadarBtn.setBackgroundColor(Color.parseColor("#00C853"));
                  startRadarBtn.setTextColor(Color.WHITE);
                  startRadarBtn.setOnClickListener(v -> startDualRadar());
                  setupCardPanel.addView(startRadarBtn);
                  
                  rootLayout.addView(setupCardPanel);

                  // 2. RADAR PANEL (Dual Discovery)
                  radarPanel = new LinearLayout(this);
                  radarPanel.setOrientation(LinearLayout.VERTICAL);
                  radarPanel.setVisibility(View.GONE);
                  
                  TextView radarIcon = new TextView(this);
                  radarIcon.setText("📡 RADAR IS ACTIVE");
                  radarIcon.setTextColor(Color.parseColor("#00E676"));
                  radarIcon.setTextSize(24);
                  radarIcon.setGravity(Gravity.CENTER);
                  radarPanel.addView(radarIcon);
                  
                  radarDeviceList = new LinearLayout(this);
                  radarDeviceList.setOrientation(LinearLayout.VERTICAL);
                  radarPanel.addView(radarDeviceList);
                  
                  rootLayout.addView(radarPanel);

                  // 3. XENDER STYLE DASHBOARD
                  dashboardPanel = new LinearLayout(this);
                  dashboardPanel.setOrientation(LinearLayout.VERTICAL);
                  dashboardPanel.setVisibility(View.GONE);
                  
                  dashboardPanel.addView(createCategoryButton("🎬 VIDEOS", "video/*", "#FF3D00"));
                  dashboardPanel.addView(createCategoryButton("🖼️ PHOTOS", "image/*", "#FFC107"));
                  dashboardPanel.addView(createCategoryButton("📁 FILES", "*/*", "#607D8B"));
                  rootLayout.addView(dashboardPanel);

                  // 4. LIVE TRANSFER MONITOR
                  monitorPanel = new LinearLayout(this);
                  monitorPanel.setOrientation(LinearLayout.VERTICAL);
                  monitorPanel.setVisibility(View.GONE);
                  monitorPanel.setPadding(20, 40, 20, 20);
                  
                  TextView monitorTitle = new TextView(this);
                  monitorTitle.setText("LIVE TRANSFER");
                  monitorTitle.setTextColor(Color.WHITE);
                  monitorTitle.setTextSize(22);
                  monitorTitle.setGravity(Gravity.CENTER);
                  monitorPanel.addView(monitorTitle);
                  
                  monitorSpeedText = new TextView(this);
                  monitorSpeedText.setTextColor(Color.parseColor("#2979FF"));
                  monitorSpeedText.setTextSize(18);
                  monitorPanel.addView(monitorSpeedText);
                  
                  monitorProgressText = new TextView(this);
                  monitorProgressText.setTextColor(Color.WHITE);
                  monitorProgressText.setTextSize(18);
                  monitorPanel.addView(monitorProgressText);
                  
                  rootLayout.addView(monitorPanel);

                  setContentView(rootLayout);
              }

              private Button createCategoryButton(String title, String mime, String color) {
                  Button btn = new Button(this);
                  btn.setText(title);
                  btn.setTextColor(Color.WHITE);
                  btn.setBackgroundColor(Color.parseColor(color));
                  LinearLayout.LayoutParams params = new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, 150);
                  params.setMargins(0, 20, 0, 20);
                  btn.setLayoutParams(params);
                  btn.setOnClickListener(v -> {
                      Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                      intent.setType(mime);
                      startActivityForResult(intent, REQUEST_PICK_FILE);
                  });
                  return btn;
              }

              private void requestPermissions() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      requestPermissions(new String[]{
                          Manifest.permission.BLUETOOTH_ADVERTISE, Manifest.permission.BLUETOOTH_CONNECT,
                          Manifest.permission.BLUETOOTH_SCAN, Manifest.permission.NEARBY_WIFI_DEVICES,
                          Manifest.permission.ACCESS_FINE_LOCATION, Manifest.permission.READ_EXTERNAL_STORAGE
                      }, 100);
                  } else {
                      requestPermissions(new String[]{
                          Manifest.permission.BLUETOOTH, Manifest.permission.ACCESS_FINE_LOCATION, Manifest.permission.READ_EXTERNAL_STORAGE
                      }, 100);
                  }
                  statusText.setText("Permissions Granted ✅");
              }

              // ================= DUAL RADAR SYSTEM =================
              private void startDualRadar() {
                  setupCardPanel.setVisibility(View.GONE);
                  radarPanel.setVisibility(View.VISIBLE);
                  statusText.setText("Looking for nearby friends...");

                  String myName = "Zeeshan_" + Build.MODEL;

                  // Become Visible (Receive Mode)
                  AdvertisingOptions adOptions = new AdvertisingOptions.Builder().setStrategy(Strategy.P2P_POINT_TO_POINT).build();
                  connectionsClient.startAdvertising(myName, SERVICE_ID, connectionLifecycleCallback, adOptions);

                  // Start Searching (Send Mode)
                  DiscoveryOptions discOptions = new DiscoveryOptions.Builder().setStrategy(Strategy.P2P_POINT_TO_POINT).build();
                  connectionsClient.startDiscovery(SERVICE_ID, endpointDiscoveryCallback, discOptions);
              }

              private final EndpointDiscoveryCallback endpointDiscoveryCallback = new EndpointDiscoveryCallback() {
                  @Override
                  public void onEndpointFound(String endpointId, DiscoveredEndpointInfo info) {
                      Button deviceBtn = new Button(MainActivity.this);
                      deviceBtn.setText("Tap to Connect: " + info.getEndpointName());
                      deviceBtn.setBackgroundColor(Color.parseColor("#2979FF"));
                      deviceBtn.setTextColor(Color.WHITE);
                      deviceBtn.setOnClickListener(v -> {
                          statusText.setText("Connecting...");
                          connectionsClient.requestConnection("Zeeshan_" + Build.MODEL, endpointId, connectionLifecycleCallback);
                      });
                      radarDeviceList.addView(deviceBtn);
                  }
                  @Override
                  public void onEndpointLost(String endpointId) {
                      radarDeviceList.removeAllViews();
                  }
              };

              // ================= AUTO ACCEPT CONNECTION =================
              private final ConnectionLifecycleCallback connectionLifecycleCallback = new ConnectionLifecycleCallback() {
                  @Override
                  public void onConnectionInitiated(String endpointId, ConnectionInfo info) {
                      // AUTO ACCEPT LOGIC
                      connectionsClient.acceptConnection(endpointId, payloadCallback);
                  }

                  @Override
                  public void onConnectionResult(String endpointId, ConnectionResolution result) {
                      if (result.getStatus().isSuccess()) {
                          connectedEndpointId = endpointId;
                          statusText.setText("✅ CONNECTED TO FRIEND");
                          radarPanel.setVisibility(View.GONE);
                          dashboardPanel.setVisibility(View.VISIBLE);
                          
                          connectionsClient.stopDiscovery();
                          connectionsClient.stopAdvertising();
                      }
                  }

                  @Override
                  public void onDisconnected(String endpointId) {
                      connectedEndpointId = null;
                      dashboardPanel.setVisibility(View.GONE);
                      monitorPanel.setVisibility(View.GONE);
                      radarPanel.setVisibility(View.VISIBLE);
                      statusText.setText("Disconnected. Back to Radar.");
                  }
              };

              // ================= LIVE TRANSFER MONITOR =================
              private final PayloadCallback payloadCallback = new PayloadCallback() {
                  @Override
                  public void onPayloadReceived(String endpointId, Payload payload) {
                      dashboardPanel.setVisibility(View.GONE);
                      monitorPanel.setVisibility(View.VISIBLE);
                      transferStartTime = System.currentTimeMillis();
                  }

                  @Override
                  public void onPayloadTransferUpdate(String endpointId, PayloadTransferUpdate update) {
                      if (update.getStatus() == PayloadTransferUpdate.Status.IN_PROGRESS) {
                          dashboardPanel.setVisibility(View.GONE);
                          monitorPanel.setVisibility(View.VISIBLE);
                          
                          long bytesTransferred = update.getBytesTransferred();
                          long totalBytes = update.getTotalBytes();
                          int progress = (int) ((bytesTransferred * 100) / totalBytes);
                          
                          long timeElapsed = System.currentTimeMillis() - transferStartTime;
                          long speed = timeElapsed > 0 ? (bytesTransferred / timeElapsed) * 1000 : 0;
                          long speedMB = speed / (1024 * 1024);
                          
                          long bytesRemaining = totalBytes - bytesTransferred;
                          long timeRemainingSec = speed > 0 ? bytesRemaining / speed : 0;
                          
                          monitorSpeedText.setText("Speed: " + speedMB + " MB/s");
                          monitorProgressText.setText("Progress: " + progress + "%\nTime Left: " + timeRemainingSec + " sec");

                      } else if (update.getStatus() == PayloadTransferUpdate.Status.SUCCESS) {
                          monitorProgressText.setText("✅ Transfer Complete!");
                      }
                  }
              };

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == REQUEST_PICK_FILE && resultCode == RESULT_OK && data != null && connectedEndpointId != null) {
                      try {
                          Payload filePayload = Payload.fromStream(getContentResolver().openInputStream(data.getData()));
                          connectionsClient.sendPayload(connectedEndpointId, filePayload);
                          transferStartTime = System.currentTimeMillis();
                          dashboardPanel.setVisibility(View.GONE);
                          monitorPanel.setVisibility(View.VISIBLE);
                      } catch (Exception e) {}
                  }
                  super.onActivityResult(requestCode, resultCode, data);
              }
          }
          EOF

      - name: Build Ultimate App
        uses: gradle/gradle-build-action@v3
        with:
          arguments: assembleDebug
          gradle-version: 8.1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Share-Ultimate
          path: app/build/outputs/apk/debug/*.apk

